name: Release Pre-req (Squash develop into main)

on:
  workflow_call:
    inputs:
      bump_type:
        description: "build, patch, minor, or major (build is Flutter-only)"
        required: true
        type: string
      bump_command:
        description: "Shell command that bumps the version [BUMP_TYPE, SEED_VERSION]."
        required: true
        type: string
      read_version_command:
        description: "Shell command that prints the current version to stdout."
        required: true
        type: string
      repo_slug:
        description: "owner/repo"
        required: true
        type: string
      validate_command:
        description: "Per-repo validation hook. VERSION env var available."
        required: false
        type: string
        default: 'make validate-release VERSION=${VERSION}'
      ci_timeout_minutes:
        description: "Max minutes to wait for develop CI to finish before aborting"
        required: false
        type: number
        default: 30
    secrets:
      bot_app_id:
        required: true
      bot_private_key:
        required: true
    outputs:
      version:
        value: ${{ jobs.prereq.outputs.version }}
      squash_commit_sha:
        value: ${{ jobs.prereq.outputs.squash_commit_sha }}
      squash_boundary:
        value: ${{ jobs.prereq.outputs.squash_boundary }}
      release_notes:
        value: ${{ jobs.prereq.outputs.release_notes }}

permissions:
  contents: write

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  prereq:
    name: Squash develop into main
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read-new.outputs.version }}
      squash_commit_sha: ${{ steps.push.outputs.sha }}
      squash_boundary: ${{ steps.boundary.outputs.sha }}
      release_notes: ${{ steps.notes.outputs.body }}

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.bot_app_id }}
          private-key: ${{ secrets.bot_private_key }}
          skip-token-revoke: true

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          ref: main

      - name: Get bot user ID
        id: bot-user
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          echo "user-id=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"

      - name: Configure git
        env:
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          USER_ID: ${{ steps.bot-user.outputs.user-id }}
        run: |
          git config --global user.name "${APP_SLUG}[bot]"
          git config --global user.email "${USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"

      - name: Fetch develop
        run: git fetch origin develop

      - name: Record squash boundary
        id: boundary
        run: echo "sha=$(git rev-parse origin/develop)" >> "$GITHUB_OUTPUT"

      - name: Pre-validate develop ahead of main
        run: |
          AHEAD=$(git rev-list --count main..origin/develop)
          if [ "$AHEAD" -eq 0 ]; then
            echo "::error::develop has no new commits over main."
            exit 1
          fi
          echo "develop is ${AHEAD} commits ahead of main"

      - name: Read current version
        id: read-current
        env:
          READ_CMD: ${{ inputs.read_version_command }}
        run: |
          CURRENT=$(eval "${READ_CMD}")
          echo "version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "Current version: ${CURRENT}"

      - name: Compute seed semver
        id: seed
        env:
          BUMP_TYPE: ${{ inputs.bump_type }}
          CURRENT: ${{ steps.read-current.outputs.version }}
        run: |
          SEMVER="${CURRENT%%+*}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$SEMVER"
          case "$BUMP_TYPE" in
            major) NEW="$((MAJOR + 1)).0.0" ;;
            minor) NEW="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) NEW="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
            build) NEW="${SEMVER}" ;;
            *)
              echo "::error::Invalid bump_type: ${BUMP_TYPE}"
              exit 1
              ;;
          esac
          echo "seed=${NEW}" >> "$GITHUB_OUTPUT"
          echo "Seed semver: ${NEW}"

      - name: Squash develop into main
        run: git merge --squash origin/develop

      - name: Run bump_command
        env:
          BUMP_TYPE: ${{ inputs.bump_type }}
          SEED_VERSION: ${{ steps.seed.outputs.seed }}
          BUMP_CMD: ${{ inputs.bump_command }}
        run: |
          eval "${BUMP_CMD}"

      - name: Read new version
        id: read-new
        env:
          READ_CMD: ${{ inputs.read_version_command }}
        run: |
          NEW=$(eval "${READ_CMD}")
          if [ -z "$NEW" ]; then
            echo "::error::read_version_command returned empty after bump."
            exit 1
          fi
          echo "version=${NEW}" >> "$GITHUB_OUTPUT"
          echo "New version: ${NEW}"

      - name: Pre-validate tag does not exist
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          NEW_VERSION: ${{ steps.read-new.outputs.version }}
          REPO_SLUG: ${{ inputs.repo_slug }}
        run: |
          if gh api "repos/${REPO_SLUG}/git/refs/tags/${NEW_VERSION}" >/dev/null 2>&1; then
            echo "::error::Tag ${NEW_VERSION} already exists."
            exit 1
          fi

      - name: Run repo validation
        env:
          VERSION: ${{ steps.read-new.outputs.version }}
          VALIDATE_COMMAND: ${{ inputs.validate_command }}
        run: |
          eval "${VALIDATE_COMMAND}"

      - name: Wait for build.yml on develop HEAD to succeed
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          DEVELOP_SHA: ${{ steps.boundary.outputs.sha }}
          REPO_SLUG: ${{ inputs.repo_slug }}
          CI_TIMEOUT_MINUTES: ${{ inputs.ci_timeout_minutes }}
        run: |
          set -euo pipefail
          DEADLINE=$(( $(date +%s) + CI_TIMEOUT_MINUTES * 60 ))
          POLL_INTERVAL=30

          # Guard: develop must not have moved since boundary was recorded
          CURRENT=$(gh api "repos/${REPO_SLUG}/git/refs/heads/develop" --jq .object.sha)
          if [ "$CURRENT" != "$DEVELOP_SHA" ]; then
            echo "::error::develop HEAD moved during release (was ${DEVELOP_SHA}, now ${CURRENT}). Abort and re-dispatch."
            exit 1
          fi

          latest_run() {
            gh api "repos/${REPO_SLUG}/actions/workflows/build.yml/runs?head_sha=${DEVELOP_SHA}" \
              --jq '.workflow_runs | max_by(.id) // empty'
          }

          LATEST=$(latest_run)
          if [ -z "$LATEST" ]; then
            RUN_ID=""; RUN_STATUS=""; RUN_CONCLUSION=""
          else
            RUN_ID=$(jq -r '.id' <<< "$LATEST")
            RUN_STATUS=$(jq -r '.status' <<< "$LATEST")
            RUN_CONCLUSION=$(jq -r '.conclusion // ""' <<< "$LATEST")
          fi

          TRIGGER_FRESH=false
          if [ -z "$RUN_ID" ]; then
            echo "No build.yml run for ${DEVELOP_SHA}; triggering fresh dispatch"
            TRIGGER_FRESH=true
          elif [ "$RUN_STATUS" = "completed" ] && [ "$RUN_CONCLUSION" != "success" ]; then
            echo "Latest build.yml run ${RUN_ID} concluded '${RUN_CONCLUSION}'; triggering fresh dispatch"
            TRIGGER_FRESH=true
          else
            echo "Tracking existing build.yml run ${RUN_ID} (status=${RUN_STATUS})"
          fi

          if [ "$TRIGGER_FRESH" = "true" ]; then
            PRIOR_ID="${RUN_ID:-0}"
            gh workflow run build.yml --ref develop --repo "${REPO_SLUG}"
            for _ in $(seq 1 12); do
              sleep 5
              NEXT=$(latest_run)
              [ -z "$NEXT" ] && continue
              NEXT_ID=$(jq -r '.id' <<< "$NEXT")
              if [ "$NEXT_ID" != "$PRIOR_ID" ]; then
                RUN_ID=$NEXT_ID
                echo "Fresh build.yml run registered: ${RUN_ID}"
                break
              fi
            done
            if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "$PRIOR_ID" ]; then
              echo "::error::Fresh build.yml dispatch did not register a new run for ${DEVELOP_SHA} within 60s"
              exit 1
            fi
          fi

          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            RUN=$(gh api "repos/${REPO_SLUG}/actions/runs/${RUN_ID}")
            STATUS=$(jq -r '.status' <<< "$RUN")
            REMAINING=$(( DEADLINE - $(date +%s) ))
            if [ "$STATUS" = "completed" ]; then
              CONCLUSION=$(jq -r '.conclusion // ""' <<< "$RUN")
              if [ "$CONCLUSION" = "success" ]; then
                echo "build.yml run ${RUN_ID} succeeded on develop HEAD"
                exit 0
              fi
              echo "::error::build.yml run ${RUN_ID} concluded '${CONCLUSION}'"
              exit 1
            fi
            echo "build.yml run ${RUN_ID} status=${STATUS} (${REMAINING}s remaining)"
            sleep $POLL_INTERVAL
          done

          echo "::error::Timed out waiting for build.yml run ${RUN_ID} after ${CI_TIMEOUT_MINUTES} minutes"
          exit 1

      - name: Generate release notes from squashed commits
        id: notes
        env:
          SQUASH_BOUNDARY: ${{ steps.boundary.outputs.sha }}
        run: |
          BODY=$(git log --pretty='format:- %s' "main..${SQUASH_BOUNDARY}")
          if [ -z "$BODY" ]; then
            BODY="- (no commits found)"
          fi
          {
            echo "body<<EOF_NOTES"
            echo "$BODY"
            echo "EOF_NOTES"
          } >> "$GITHUB_OUTPUT"

      - name: Commit + push squash to main
        id: push
        env:
          NEW_VERSION: ${{ steps.read-new.outputs.version }}
          RELEASE_NOTES: ${{ steps.notes.outputs.body }}
        run: |
          git add -A
          git commit -m "Release ${NEW_VERSION}" -m "${RELEASE_NOTES}"
          git push origin main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

