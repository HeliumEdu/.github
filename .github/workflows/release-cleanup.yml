name: Release Cleanup (Merge main into develop)

on:
  workflow_call:
    inputs:
      squash_boundary:
        description: "develop SHA squashed in pre-req (informational only; preserved for caller compat)"
        required: false
        type: string
        default: ''
    secrets:
      bot_app_id:
        required: true
      bot_private_key:
        required: true

permissions:
  contents: write
  pull-requests: read

jobs:
  cleanup:
    name: Merge main into develop
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.bot_app_id }}
          private-key: ${{ secrets.bot_private_key }}
          skip-token-revoke: true

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          ref: develop

      - name: Get bot user ID
        id: bot-user
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          echo "user-id=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"

      - name: Configure git
        env:
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          USER_ID: ${{ steps.bot-user.outputs.user-id }}
        run: |
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"

      - name: Merge main into develop
        run: |
          set -euo pipefail

          git fetch origin main develop
          git checkout -B develop origin/develop

          if git merge-base --is-ancestor origin/main HEAD; then
            echo "main is already merged into develop (no-op)"
            exit 0
          fi

          if ! git merge --no-ff -m "Merge main into develop" origin/main; then
            echo "::error::Merge conflict while merging main into develop. Resolve manually:"
            echo "  git fetch origin main develop"
            echo "  git checkout develop && git pull"
            echo "  git merge main  # resolve conflicts"
            echo "  git push origin develop"
            git merge --abort || true
            exit 1
          fi

          # Normal push (no force). If develop moved during cleanup, this fails;
          # re-running the cleanup job picks up the new state and tries again.
          git push origin develop
          echo "Merged main into develop ($(git rev-parse --short HEAD))"
