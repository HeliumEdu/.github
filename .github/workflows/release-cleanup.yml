name: Release Cleanup (Merge main into develop)

on:
  workflow_call:
    secrets:
      bot_app_id:
        required: true
      bot_private_key:
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup:
    name: Merge main into develop
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.bot_app_id }}
          private-key: ${{ secrets.bot_private_key }}
          skip-token-revoke: true

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          ref: develop

      - name: Get bot user ID
        id: bot-user
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          echo "user-id=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"

      - name: Configure git
        env:
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          USER_ID: ${{ steps.bot-user.outputs.user-id }}
        run: |
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"

      - name: Merge main into develop
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          git fetch origin main develop
          git checkout -B develop origin/develop

          if git merge-base --is-ancestor origin/main HEAD; then
            echo "main is already merged into develop (no-op)"
            exit 0
          fi

          if git merge --no-ff -m "Merge main into develop" origin/main; then
            git push origin develop
            echo "Merged main into develop ($(git rev-parse --short HEAD))"
            exit 0
          fi

          # Conflict path: open a PR so the conflicts can be resolved in GitHub's web UI.
          git merge --abort || true

          MAIN_SHA=$(git rev-parse origin/main)
          SHORT_SHA="${MAIN_SHA:0:7}"
          BRANCH="cleanup/merge-main-${SHORT_SHA}"

          # Snapshot main's tip onto a stable cleanup branch as the PR head.
          git push --force-with-lease origin "${MAIN_SHA}:refs/heads/${BRANCH}"

          EXISTING=$(gh pr list --repo "${REPO}" --head "${BRANCH}" --base develop \
            --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "::warning::Cleanup conflict; PR #${EXISTING} already open for ${BRANCH}"
            exit 0
          fi

          gh pr create \
            --repo "${REPO}" \
            --base develop \
            --head "${BRANCH}" \
            --title "Resolve merge conflict: main into develop (${SHORT_SHA})" \
            --body "$(cat <<EOF
          The release-cleanup workflow could not auto-merge \`main\` into \`develop\` after the latest release.

          - Conflicting head on main: \`${MAIN_SHA}\`
          - Use GitHub's **Resolve conflicts** button on this PR to fix in-browser, then merge with **Create a merge commit** (not squash).
          - Or locally:
            \`\`\`
            git fetch origin main develop
            git checkout develop && git pull
            git merge main   # resolve conflicts
            git push origin develop
            \`\`\`
          EOF
          )"

          echo "::warning::Cleanup conflict; opened PR for manual resolution"
