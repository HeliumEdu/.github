name: 🚀 Enhancement
description: New feature request? Docs need improvement? Let us know.
labels: ["enhancement"]

body:

- type: markdown
  attributes:
    value: |
      ## 🛑 First — are you an end user?

      If you're not sure what "this repository" means, file in [Helium Support](https://heliumedu.atlassian.net/helpcenter/HS/contact-us) instead — no GitHub account needed. This template is for developers proposing specific code or docs changes.

      Helium is a passion project — free for everyone, made possible by [supporters like you](https://www.patreon.com/alexdlaird/membership) ❤️. Small team, so we triage by impact and act as time allows. PRs implementing features especially welcome.

- type: checkboxes
  id: ack
  attributes:
    label: Acknowledgements
    options:
    - label: I have written a descriptive issue title
      required: true
    - label: I have searched [Issues](issues?q=is%3Aissue) to see if the enhancement has already been requested
      required: true

- type: textarea
  id: describe-the-enhancement
  attributes:
    label: Describe the Enhancement
    description: A clear and concise description of the how and why of the feature you'd like to see, or what specifically should be added to the documentation. If possible, include code snippets of interfaces you'd like to see and how you might interact with them.
  validations:
    required: true

- type: textarea
  id: describe-workarounds
  attributes:
    label: Describe Alternative Solutions / Workarounds
    description: A clear and concise description of any alternative solutions or features you've considered. If applicable, please provide snippets of any current workarounds you use.
