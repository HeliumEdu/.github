name: 🐛 Bug Report
description: Found a bug in Helium's code? Help us squash it.
labels: ["bug"]

body:

- type: markdown
  attributes:
    value: |
      ## 🛑 First — are you an end user?

      If you're not sure what "this repository" means, file in [Helium Support](https://heliumedu.atlassian.net/servicedesk/customer/portals) instead — no GitHub account needed. This template is structured for developer-style bug reports (repro steps, environment, etc.).

      Helium is a passion project — free for everyone, made possible by [supporters like you](https://patreon.com/HeliumEdu) ❤️. Small team, so we triage by impact and act as time allows. PRs resolving bugs especially welcome.

- type: checkboxes
  id: ack
  attributes:
    label: Acknowledgements
    options:
    - label: I have written a descriptive issue title
      required: true
    - label: I have searched [Issues](issues?q=is%3Aissue) to see if the bug has already been reported
      required: true
    - label: I have confirmed this is a code bug in this specific repository (not a how-to question, account issue, or general support request — those belong in [Helium Support](https://heliumedu.atlassian.net/servicedesk/customer/portals))
      required: true

- type: dropdown
  id: platform
  attributes:
    label: Platform
    description: Where are you experiencing this bug?
    options:
      - iOS
      - Android
      - Web (app)
      - Backend / API
      - Marketing site (www)
      - Infra / deploy
      - Other
  validations:
    required: true

- type: input
  id: helium-version
  attributes:
    label: Helium Version
    description: From the app's Settings / About screen, or the `X-Helium-Version` API response header. Skip for `www` / `infra` bugs (reference a commit SHA in the description instead).
    placeholder: 3.5.27

- type: input
  id: os-version
  attributes:
    label: Operating System / Browser
    description: Skip for `Backend / API` or `Infra` bugs where it isn't relevant.
    placeholder: iOS 18.2, Android 15, macOS 15.1, Chrome 130 on Windows 11

- type: textarea
  id: describe-the-bug
  attributes:
    label: Describe the Bug
    description: |
      A clear and concise description of what the bug is, including any errors thrown or unexpected behavior.

      "Creating an assignment didn't work" is not a useful description and will likely be closed. We need contextual details: what was the assignment name, the course group, the categories? Whatever the bug, we need the surrounding context to troubleshoot.
  validations:
    required: true

- type: textarea
  id: steps-to-reproduce
  attributes:
    label: Steps to Reproduce
    description: Numbered steps so we can reliably trigger the bug ourselves.
  validations:
    required: true

- type: textarea
  id: expected-behavior
  attributes:
    label: Expected Behavior
    description: A brief description of what you expected to happen.

- type: textarea
  id: console-output
  attributes:
    label: Console Output / Error Responses
    description: If you have access to logs, stacktraces, or failed API responses (e.g. from the browser debugger or device logs), paste them here.
